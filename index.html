<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- title and link fabric -->
    <title>GitHub | Login</title>
    <link rel="shortcut icon" href="./assets/github-logo.png" type="image/x-icon">

    <!-- awesome font cdn  -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />

    <!-- daisyUi+tailwind cnd  -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- link css -->
    <link rel="stylesheet" href="./styles/style.css">
</head>

<body class="bg-[#F8FAFC] w-screen h-screen flex items-center justify-center">
    <section class=" w-[520px] p-8 bg-[#FFFFFF] shadow-sm rounded-2xl ">
        <div class="flex items-center flex-col mb-6 ">
            <img src="./assets/github-logo.png" alt="">
            <h1 class=" text-2xl font-bold mt-5">GitHub Issues Tracker</h1>
            <p class=" text-[14px]">Sign in to manage your issues</p>
        </div>

        <form class="flex flex-col gap-1.5">
            <label class="my-3" for="username">Username</label>
            <input class="text-lg outline-none bg-[#F8FAFC] border-none py-2 px-3 rounded-lg" type="text" id="username" placeholder="Enter Username">
            <p class="text-[14px] text-[#4A00FF]">Dafault: admin</p>

            <label class="mt-3" for="password">Password</label>
            <input class="text-lg outline-none bg-[#F8FAFC] border-none py-2 px-3 rounded-lg" type="password" id="password" placeholder="Enter Password">
            <p class="text-[14px] text-[#4A00FF] mb-3.5">Dafault: admin123</p>

            <button type="button" onclick="logingBtn()" class="btn btn-primary text-[14px] ">Sing In</button>
        </form>


        <div class="flex items-center">
            <hr class="w-[50%]">
            <p class="px-3 py-3.5">OR</p>
            <hr class="w-[50%]">
        </div>

        <div class="">
            <p class=" text-center text-[14px] text-[#64748B] mb-1.5">Demo Credentials:</p>
            <div class="bg-[#F8FAFC] flex items-center flex-col py-6">
                <p><span class=" text-lg font-semibold">Username:</span> admin</p>
                <p><span class=" text-lg font-semibold">Username:</span> admin123</p>
            </div>
        </div>
    </section>

    <script src="./js/script.js"></script>
</body>

</html>
